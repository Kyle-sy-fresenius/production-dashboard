<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:25px;
}

.card{
  width:700px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:8px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

/* LAYOUT */
.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
}

/* LEFT PANEL */
.panel{
  width:45%;
  height:260px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border:2px solid white;
  border-radius:12px;
  padding:12px;
  box-sizing:border-box;
}

/* 🔴🟠🟢 STATUS RING (RESTORED + GLOW FIX) */
#statusRing{
  width:160px;
  height:160px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:15px;
  text-align:center;
  border:6px solid rgba(255,255,255,0.2);
  transition:0.3s ease;
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* CENTER PANEL */
.centerPanel{
  width:45%;
  height:260px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border:2px solid white;
  border-radius:12px;
  padding:12px;
  box-sizing:border-box;
}

/* PIE */
#chartBox{
  width:180px;
  height:180px;
}

/* LAST 4 */
.recentMini{
  text-align:left;
  font-size:14px;
  line-height:22px;
  padding-left:10px;
  min-width:120px;
}

.recentItem{
  margin:3px 0;
}

.fade{
  opacity:0.5;
}

/* STATUS TEXT */
#trackText{
  margin-top:10px;
  font-size:14px;
}

/* SUMMARY */
#summaryScreen{
  display:none;
}

.summaryBox{
  margin-top:40px;
  font-size:22px;
  line-height:40px;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<!-- START -->
<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Total units">
  <button onclick="start()">Start</button>
</div>

<!-- DASHBOARD -->
<div id="mainScreen" style="display:none;">

<div>Total: <span id="totalShow">0</span></div>
<div>Packed: <span id="packedShow">0</span></div>
<div>Remaining: <span id="remainingShow">0</span></div>

<input id="addInput" type="number" placeholder="Add units">
<button onclick="add()">Add</button>

<div class="frame">

<!-- LEFT -->
<div class="panel">
  <div id="statusRing">--</div>
  <div id="trackText"></div>
</div>

<!-- CENTER -->
<div class="centerPanel">

  <div id="chartBox">
    <canvas id="chart"></canvas>
  </div>

  <div class="recentMini" id="recentTop"></div>

</div>

</div>

<button onclick="endShift()" style="margin-top:15px;background:#ff4d4d;color:white;">
End Production
</button>

</div>

<!-- SUMMARY -->
<div id="summaryScreen">

  <h2>Shift Summary</h2>

  <div class="summaryBox">
    Packed: <span id="sumPacked"></span><br>
    Total: <span id="sumTotal"></span><br>
    Percentage: <span id="sumPercent"></span>
  </div>

  <button onclick="backToDashboard()">Back to Dashboard</button>

</div>

</div>

<script>

let total=0;
let packed=0;
let recent=[];
let chart;
let started=false;

/* START */
function start(){
  total = parseFloat(totalInput.value);
  packed = 0;
  recent = [];
  started = true;

  showMain();
  createChart();
  update();
}

/* ADD */
function add(){
  let v = parseFloat(addInput.value);
  if(!v) return;

  packed += v;
  recent.unshift(v);

  if(recent.length > 50) recent.pop();

  addInput.value="";
  update();
}

/* SHOW DASHBOARD */
function showMain(){
  startScreen.style.display="none";
  mainScreen.style.display="block";
  summaryScreen.style.display="none";
}

/* END SHIFT */
function endShift(){
  const password = prompt("Enter password:");

  const allowed = [
    "Kyle","Sofiya","Anjali","Osama","Elamari",
    "Elham","Krithika","Niroshan","Lokesh","Netra"
  ];

  if(!allowed.includes(password)){
    alert("Incorrect password");
    return;
  }

  let percent = total ? ((packed/total)*100).toFixed(1) : 0;

  sumPacked.innerText = packed;
  sumTotal.innerText = total;
  sumPercent.innerText = percent + "%";

  mainScreen.style.display="none";
  summaryScreen.style.display="block";
}

/* RESET */
function backToDashboard(){
  total=0;
  packed=0;
  recent=[];
  started=false;

  summaryScreen.style.display="none";
  startScreen.style.display="block";
}

/* CHART */
function createChart(){
  if(chart) return;

  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"]
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        datalabels:{
          color:"#fff",
          formatter:(v,ctx)=>{
            const d = ctx.chart.data.datasets[0].data;
            const sum = d[0]+d[1];
            return sum ? ((v/sum)*100).toFixed(0)+"%" : "0%";
          }
        }
      }
    },
    plugins:[ChartDataLabels]
  });
}

/* 🔴🟠🟢 UPDATED RING LOGIC (WITH GLOW) */
function update(){

  totalShow.innerText = total;
  packedShow.innerText = packed;
  remainingShow.innerText = Math.max(total-packed,0);

  chart.data.datasets[0].data = [
    Math.min(packed,total),
    Math.max(total-packed,0)
  ];
  chart.update();

  const ring = document.getElementById("statusRing");
  const trackText = document.getElementById("trackText");

  const ratio = total ? packed/total : 0;

  if(!started){
    ring.innerText="--";
    ring.style.border="6px solid rgba(255,255,255,0.2)";
    ring.style.boxShadow="0 0 20px rgba(255,255,255,0.2)";
  }
  else if(ratio >= 1){
    ring.innerText="100% COMPLETE";
    ring.style.border="6px solid #00ff88";
    ring.style.boxShadow="0 0 25px #00ff88";
  }
  else if(ratio >= 0.8){
    ring.innerText=Math.round(ratio*100)+"% ON TRACK";
    ring.style.border="6px solid #00ff88";
    ring.style.boxShadow="0 0 20px #00ff88";
  }
  else if(ratio >= 0.5){
    ring.innerText=Math.round(ratio*100)+"% SLOW";
    ring.style.border="6px solid orange";
    ring.style.boxShadow="0 0 20px orange";
  }
  else{
    ring.innerText=Math.round(ratio*100)+"% CRITICAL";
    ring.style.border="6px solid red";
    ring.style.boxShadow="0 0 25px red";
  }

  trackText.innerText = started
    ? (packed >= total
        ? "On track"
        : "Need " + (total-packed) + " units to finish")
    : "";

  const last4 = recent.slice(0,4);

  recentTop.innerHTML =
    last4.map((v,i)=>`
      <div class="recentItem ${i===0?'':'fade'}">+${v}</div>
    `).join("");
}

</script>

</body>
</html>
