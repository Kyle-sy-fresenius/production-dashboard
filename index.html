<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

.card{
  width:560px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
}

.panel{
  width:50%;
  border:2px solid white;
  border-radius:12px;
  padding:15px;
}

#status{
  width:140px;
  height:140px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
}

/* chart */
#chartBox{
  width:140px;
  height:140px;
  margin:auto;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

canvas{
  width:140px !important;
  height:140px !important;
}

/* SIDE LIST (RESTORED) */
#recentAdds{
  font-size:11px;
  text-align:left;
  max-height:140px;
  overflow:hidden;
}

.recentItem{
  margin:2px 0;
}

.fade{
  opacity:0.35;
}

/* summary */
#summary{
  display:none;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Total units">
  <button onclick="start()">Start</button>
</div>

<div id="mainScreen" style="display:none;">

<div>Total: <span id="totalShow">0</span></div>
<div>Packed: <span id="packedShow">0</span></div>
<div>Remaining: <span id="remainingShow">0</span></div>

<input id="addInput" type="number" placeholder="Add units">
<button onclick="add()">Add</button>

<div class="frame">

<div class="panel">
  <div id="status">--</div>
  <div id="trackText">--</div>
</div>

<div class="panel">

  <div style="display:flex;justify-content:center;align-items:center;">
    
    <div id="chartBox">
      <canvas id="chart"></canvas>
    </div>

    <!-- SIDE LIST RESTORED -->
    <div id="recentAdds"></div>

  </div>

</div>

</div>

<button onclick="endShift()" style="margin-top:20px;background:#ff4d4d;color:white;">
  End Production
</button>

</div>

<div id="summary"></div>

</div>

<script>

const sb = supabase.createClient(
  "https://afakpgezcpvvnvoqcthj.supabase.co",
  "YOUR_ANON_KEY"
);

let total = 0;
let packed = 0;
let chart;
let recentAdds = [];

/* START */
function start(){
  const v = parseFloat(document.getElementById("totalInput").value);
  if(isNaN(v) || v <= 0) return;

  total = v;
  packed = 0;

  document.getElementById("startScreen").style.display="none";
  document.getElementById("mainScreen").style.display="block";

  createChart();
  update();
}

/* CHART */
function createChart(){
  if(chart) return;

  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"]
      }]
    },

    options:{
      layout:{padding:0},
      plugins:{
        legend:{
          display:true,
          position:"bottom",
          labels:{
            color:"white",
            font:{size:10},
            boxWidth:8,
            padding:6
          }
        },
        datalabels:{
          color:"white",
          font:{weight:"bold",size:10},
          formatter:(value,ctx)=>{
            let data = ctx.chart.data.datasets[0].data;
            let sum = data.reduce((a,b)=>a+b,0);
            if(sum===0) return "0%";
            return ((value/sum)*100).toFixed(0)+"%";
          }
        }
      }
    },

    plugins:[ChartDataLabels]
  });
}

/* ADD */
function add(){
  const v = parseFloat(document.getElementById("addInput").value);
  if(isNaN(v)) return;

  packed += v;

  recentAdds.unshift(v);
  if(recentAdds.length > 8) recentAdds.pop();

  document.getElementById("addInput").value="";

  update();
  renderRecent();
}

/* SIDE LIST RENDER */
function renderRecent(){
  let html = "";

  recentAdds.forEach((v,i)=>{
    let cls = i>=4 ? "fade" : "";
    html += `<div class="recentItem ${cls}">+${v}</div>`;
  });

  document.getElementById("recentAdds").innerHTML = html;
}

/* UPDATE */
function update(){
  document.getElementById("totalShow").innerText = total;
  document.getElementById("packedShow").innerText = packed;
  document.getElementById("remainingShow").innerText = Math.max(total-packed,0);

  chart.data.datasets[0].data = [
    Math.min(packed,total),
    Math.max(total-packed,0)
  ];
  chart.update();

  const now = new Date();
  const start = new Date(); start.setHours(8,30,0,0);
  const end = new Date(); end.setHours(21,30,0,0);

  let progress = (now-start)/(end-start);
  progress = Math.max(0,Math.min(1,progress));

  let expected = total * progress;

  let status = document.getElementById("status");
  let track = document.getElementById("trackText");

  status.style.background = packed/total >= progress ? "green" : "red";
  status.innerText = packed/total >= progress ? "On Track" : "Behind";

  track.innerText =
    packed >= expected
    ? "On track"
    : "Need " + Math.ceil(expected-packed) + " units";
}

/* END */
function endShift(){
  document.getElementById("mainScreen").style.display="none";
  document.getElementById("summary").style.display="block";

  const remaining = total - packed;
  const percent = total ? ((packed/total)*100).toFixed(1) : 0;

  document.getElementById("summary").innerHTML = `
    <h2>Shift Complete</h2>
    <p>Packed: ${packed}</p>
    <p>Remaining: ${remaining}</p>
    <p>Completion: ${percent}%</p>
    <button onclick="location.reload()">Restart</button>
  `;
}

</script>

</body>
</html>
