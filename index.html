<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

.card{
  width:560px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
}

.panel{
  width:50%;
  border:2px solid white;
  border-radius:12px;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* =========================
   🔥 GLOWING STATUS RING
========================= */
#status{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 0 10px rgba(255,255,255,0.2);
}

/* CHART */
#chartBox{
  width:160px;
  height:160px;
}

/* RECENT LIST */
#recentAdds{
  width:60px;
  font-size:11px;
  text-align:left;
}

.recentItem{margin:2px 0;}
.fade{opacity:0.35;}

#trackText{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Total units">
  <button onclick="start()">Start</button>
</div>

<div id="mainScreen" style="display:none;">

<div>Total: <span id="totalShow">0</span></div>
<div>Packed: <span id="packedShow">0</span></div>
<div>Remaining: <span id="remainingShow">0</span></div>

<input id="addInput" type="number" placeholder="Add units">
<button onclick="add()">Add</button>

<div class="frame">

<!-- STATUS (GLOWING RING) -->
<div class="panel">
  <div id="status">--</div>
  <div id="trackText">--</div>
</div>

<!-- PIE + LEGEND + LIST -->
<div class="panel">

  <div style="font-size:12px;margin-bottom:6px;">
    🟢 Packed | 🔴 Remaining
  </div>

  <div class="chartRow">
    <div id="chartBox">
      <canvas id="chart"></canvas>
    </div>

    <div id="recentAdds"></div>
  </div>

</div>

</div>

</div>

<script>

let total = 0;
let packed = 0;
let recentAdds = [];
let chart;

/* START */
function start(){
  const v = parseFloat(document.getElementById("totalInput").value);
  if(isNaN(v) || v <= 0) return;

  total = v;
  packed = 0;

  document.getElementById("startScreen").style.display="none";
  document.getElementById("mainScreen").style.display="block";

  createChart();
  update();
}

/* CHART */
function createChart(){
  if(chart) return;

  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"],
        borderWidth:0
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        datalabels:{
          color:"white",
          font:{size:11,weight:"bold"},
          formatter:(value,ctx)=>{
            const data = ctx.chart.data.datasets[0].data;
            const sum = data.reduce((a,b)=>a+b,0);
            if(sum===0) return "0%";
            return ((value/sum)*100).toFixed(0)+"%";
          }
        }
      }
    },
    plugins:[ChartDataLabels]
  });
}

/* ADD */
function add(){
  const v = parseFloat(document.getElementById("addInput").value);
  if(isNaN(v)) return;

  packed += v;

  recentAdds.unshift(v);
  if(recentAdds.length > 6) recentAdds.pop();

  document.getElementById("addInput").value="";

  update();
  updateRecent();
}

/* UPDATE */
function update(){
  document.getElementById("totalShow").innerText = total;
  document.getElementById("packedShow").innerText = packed;
  document.getElementById("remainingShow").innerText = Math.max(total-packed,0);

  chart.data.datasets[0].data = [
    Math.min(packed,total),
    Math.max(total-packed,0)
  ];
  chart.update();

  /* TIME BASED TRACKING */
  const now = new Date();
  const start = new Date(); start.setHours(8,30,0,0);
  const end = new Date(); end.setHours(21,30,0,0);

  let timeProgress = (now-start)/(end-start);
  timeProgress = Math.max(0,Math.min(1,timeProgress));

  let expected = total * timeProgress;

  const status = document.getElementById("status");
  const track = document.getElementById("trackText");

  let ratio = total ? packed/total : 0;

  /* 🔥 GLOWING STATUS RING */
  if(ratio >= timeProgress){
    status.style.background="rgba(0,255,136,0.15)";
    status.style.boxShadow="0 0 18px #00ff88";
    status.style.border="2px solid #00ff88";
    status.innerText="On Track";
  } else {
    status.style.background="rgba(255,0,0,0.15)";
    status.style.boxShadow="0 0 18px red";
    status.style.border="2px solid red";
    status.innerText="Behind";
  }

  track.innerText =
    packed >= expected
    ? "On track for shift pace"
    : "Need " + Math.ceil(expected-packed) + " units";
}

/* RECENT LIST */
function updateRecent(){
  let html = "";

  recentAdds.forEach((v,i)=>{
    let cls = i>=3 ? "fade" : "";
    html += `<div class="recentItem ${cls}">+${v}</div>`;
  });

  document.getElementById("recentAdds").innerHTML = html;
}

</script>

</body>
</html>
