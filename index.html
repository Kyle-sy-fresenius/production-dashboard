<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:25px;
}

.card{
  width:620px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:8px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
  align-items:stretch;
}

.panel{
  width:50%;
  height:260px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  border:2px solid white;
  border-radius:12px;
  padding:12px;
  box-sizing:border-box;
  overflow:hidden;
}

#chartBox, #statusRing{
  width:180px;
  height:180px;
}

#statusRing{
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  transition:0.3s;
  border:6px solid rgba(255,255,255,0.2);
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.legend{
  font-size:11px;
  margin-bottom:6px;
  opacity:0.9;
}

/* FIXED 4-VISIBLE LIST */
#recentTop{
  width:100%;
  font-size:12px;
  margin-top:10px;
  min-height:80px;
}

#recentScroll{
  width:100%;
  max-height:70px;
  overflow-y:auto;
  font-size:12px;
  margin-top:6px;
  border-top:1px solid rgba(255,255,255,0.2);
  padding-top:5px;
}

.recentItem{
  margin:2px 0;
  transition:0.2s;
}

.fade{
  opacity:0.35;
}

#endBtn{
  margin-top:15px;
  background:#ff4d4d;
  color:white;
}

#trackText{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<!-- START -->
<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Total units">
  <button onclick="start()">Start</button>
</div>

<!-- MAIN -->
<div id="mainScreen" style="display:none;">

<div>Total: <span id="totalShow">0</span></div>
<div>Packed: <span id="packedShow">0</span></div>
<div>Remaining: <span id="remainingShow">0</span></div>

<input id="addInput" type="number" placeholder="Add units">
<button onclick="add()">Add</button>

<div class="frame">

<!-- STATUS -->
<div class="panel">
  <div id="statusRing">--</div>
  <div id="trackText"></div>
</div>

<!-- PIE -->
<div class="panel">

<div class="legend">🟢 Packed | 🔴 Remaining</div>

<div id="chartBox">
  <canvas id="chart"></canvas>
</div>

<!-- LIST -->
<div id="recentTop"></div>
<div id="recentScroll"></div>

</div>

</div>

<button id="endBtn" onclick="endShift()">End Production</button>

</div>

</div>

<!-- REPORT -->
<div id="reportScreen" style="display:none;" class="card">

<h1>Shift Report</h1>

<div style="font-size:18px;margin-top:20px;">
  <div>Packed: <span id="repPacked">0</span></div>
  <div>Remaining: <span id="repRemaining">0</span></div>
  <div>Completion: <span id="repPercent">0%</span></div>
</div>

<button onclick="backToMain()" style="margin-top:20px;">
  Back to Dashboard
</button>

</div>

<script>

/* SUPABASE */
const sb = supabase.createClient(
  "https://afakpgezcpvvnvoqcthj.supabase.co",
  "sb_publishable_n7KfiuQXIE_hekGgd3eXsQ_gEqaJ_9Y"
);

/* ELEMENTS */
const startScreen = document.getElementById("startScreen");
const mainScreen = document.getElementById("mainScreen");
const reportScreen = document.getElementById("reportScreen");

const totalInput = document.getElementById("totalInput");
const addInput = document.getElementById("addInput");

const totalShow = document.getElementById("totalShow");
const packedShow = document.getElementById("packedShow");
const remainingShow = document.getElementById("remainingShow");

/* STATE */
let total = 0;
let packed = 0;
let recent = [];
let chart;
let started = false;

/* LOAD */
async function load(){
  const { data } = await sb
    .from("production_dashboard")
    .select("*")
    .eq("id",1)
    .single();

  if(!data) return;

  total = data.total;
  packed = data.packed;
  recent = data.recent_adds || [];

  showMain();
  createChart();
  update();
}

load();

/* START */
function start(){
  total = parseFloat(totalInput.value);
  packed = 0;
  recent = [];

  started = true;

  save();
  showMain();
  createChart();
  update();
}

/* ADD */
function add(){
  let v = parseFloat(addInput.value);
  if(!v) return;

  packed += v;

  recent.unshift(v);
  if(recent.length > 50) recent.pop();

  addInput.value="";
  save();
  update();
}

/* SAVE */
async function save(){
  await sb.from("production_dashboard").upsert({
    id:1,
    total,
    packed,
    recent_adds:recent
  });
}

/* SHOW */
function showMain(){
  startScreen.style.display="none";
  mainScreen.style.display="block";
}

/* CHART */
function createChart(){
  if(chart) return;

  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"]
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        datalabels:{
          color:"#fff",
          formatter:(v,ctx)=>{
            const d = ctx.chart.data.datasets[0].data;
            const sum = d[0]+d[1];
            return sum ? ((v/sum)*100).toFixed(0)+"%" : "0%";
          }
        }
      }
    },
    plugins:[ChartDataLabels]
  });
}

/* UPDATE */
function update(){

  totalShow.innerText = total;
  packedShow.innerText = packed;
  remainingShow.innerText = Math.max(total-packed,0);

  chart.data.datasets[0].data = [
    Math.min(packed,total),
    Math.max(total-packed,0)
  ];
  chart.update();

  /* TRACKING */
  const now = new Date();
  const start = new Date(); start.setHours(8,30,0,0);
  const end = new Date(); end.setHours(21,30,0,0);

  let timeProgress = started
    ? (now - start) / (end - start)
    : 0;

  timeProgress = Math.max(0, Math.min(1, timeProgress));

  let expected = total * timeProgress;
  let diff = packed - expected;

  let ratio = total ? packed / total : 0;

  const ring = document.getElementById("statusRing");
  const trackText = document.getElementById("trackText");

  /* RING */
  if(!started){
    ring.innerText="--";
    ring.style.border="6px solid rgba(255,255,255,0.2)";
  }
  else if(ratio >= 1){
    ring.innerText="100% COMPLETE";
    ring.style.border="6px solid #00ff88";
  }
  else if(diff >= 0){
    ring.innerText=Math.round(ratio*100)+"% ON TRACK";
    ring.style.border="6px solid #00ff88";
  }
  else{
    ring.innerText=Math.round(ratio*100)+"%";
    ring.style.border="6px solid red";
  }

  /* TEXT */
  let needed = expected - packed;

  trackText.innerText = !started
    ? ""
    : (needed <= 0
      ? "On track"
      : "Need " + Math.ceil(needed) + " units to be on track");

  /* LIST: ALWAYS 4 VISIBLE */
  const last4 = recent.slice(0,4);
  const rest = recent.slice(4);

  document.getElementById("recentTop").innerHTML =
    last4.map((v,i)=>`
      <div class="recentItem ${i===0?'':'fade'}">
        +${v}
      </div>
    `).join("");

  document.getElementById("recentScroll").innerHTML =
    rest.map(v=>`
      <div class="recentItem fade">+${v}</div>
    `).join("");
}

/* END SHIFT */
function endShift(){

  const password = prompt("Enter password:");

  const allowed = [
    "Kyle","Sofiya","Anjali","Osama","Elamari",
    "Elham","Krithika","Niroshan","Lokesh","Netra"
  ];

  if(!allowed.includes(password)){
    alert("Incorrect password");
    return;
  }

  const remaining = Math.max(total - packed, 0);
  const percent = total ? ((packed / total) * 100).toFixed(1) : 0;

  document.getElementById("repPacked").innerText = packed;
  document.getElementById("repRemaining").innerText = remaining;
  document.getElementById("repPercent").innerText = percent + "%";

  mainScreen.style.display="none";
  reportScreen.style.display="block";

  resetAll();

  setTimeout(() => {
    reportScreen.style.display="none";
    startScreen.style.display="block";
  }, 2500);
}

/* BACK RESET */
function backToMain(){

  reportScreen.style.display="none";
  mainScreen.style.display="none";
  startScreen.style.display="block";

  total=0;
  packed=0;
  recent=[];
  started=false;

  totalInput.value="";
  addInput.value="";

  totalShow.innerText="0";
  packedShow.innerText="0";
  remainingShow.innerText="0";

  document.getElementById("recentTop").innerHTML="";
  document.getElementById("recentScroll").innerHTML="";

  if(chart){
    chart.data.datasets[0].data=[0,0];
    chart.update();
  }

  document.getElementById("statusRing").innerText="--";
  document.getElementById("trackText").innerText="";
}

/* RESET */
function resetAll(){
  total=0;
  packed=0;
  recent=[];
  save();
}

</script>

</body>
</html>
