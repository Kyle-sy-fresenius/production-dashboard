<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

.card{
  width:560px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
}

.panel{
  width:50%;
  border:2px solid white;
  border-radius:12px;
  padding:15px;
}

#status{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
}

#chartBox{
  width:160px;
  height:160px;
}

.chartRow{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

#recentAdds{
  width:60px;
  font-size:11px;
  text-align:left;
}

.recentItem{margin:2px 0;}
.fade{opacity:0.35;}

#trackText{margin-top:10px;font-size:14px}

/* =========================
   🔥 NUMBER FADE ANIMATION
========================= */
.fade-number {
  animation: fadeDown 0.35s ease;
}

@keyframes fadeDown {
  0% {
    opacity: 0;
    transform: translateY(-10px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Total units">
  <button onclick="start()">Start</button>
</div>

<div id="mainScreen" style="display:none;">

<div>Total: <span id="totalShow">0</span></div>
<div>Packed: <span id="packedShow">0</span></div>
<div>Remaining: <span id="remainingShow">0</span></div>

<input id="addInput" type="number" placeholder="Add units">
<button onclick="add()">Add</button>

<div class="frame">

<div class="panel">
  <div id="status">--</div>
  <div id="trackText">--</div>
</div>

<div class="panel">
  <div class="chartRow">
    <div id="chartBox">
      <canvas id="chart"></canvas>
    </div>
    <div id="recentAdds"></div>
  </div>
</div>

</div>

</div>
</div>

<script>
const { createClient } = supabase;

const sb = createClient(
  "https://afakpgezcpvvnvoqcthj.supabase.co",
  "YOUR_ANON_KEY"
);

/* ELEMENTS */
const startScreen = document.getElementById("startScreen");
const mainScreen = document.getElementById("mainScreen");

const totalInput = document.getElementById("totalInput");
const addInput = document.getElementById("addInput");

const totalShow = document.getElementById("totalShow");
const packedShow = document.getElementById("packedShow");
const remainingShow = document.getElementById("remainingShow");

const recentAddsEl = document.getElementById("recentAdds");
const statusBox = document.getElementById("status");
const trackText = document.getElementById("trackText");

/* STATE */
let total = 0;
let packed = 0;
let recentAdds = [];
let chart;

/* =========================
   🔥 FADE FUNCTION
========================= */
function animateNumber(el, value){
  el.classList.remove("fade-number");
  void el.offsetWidth;
  el.innerText = value;
  el.classList.add("fade-number");
}

/* LOAD */
async function loadData(){
  const { data } = await sb
    .from("production_dashboard")
    .select("*")
    .eq("id",1)
    .single();

  if(!data) return;

  total = data.total || 0;
  packed = data.packed || 0;
  recentAdds = data.recent_adds || [];

  updateRecent();

  if(total > 0){
    startScreen.style.display="none";
    mainScreen.style.display="block";
    createChart();
    update();
  }
}

/* SAVE */
async function saveData(){
  await sb.from("production_dashboard").upsert({
    id:1,
    total,
    packed,
    recent_adds: recentAdds
  });
}

/* START */
function start(){
  total = parseFloat(totalInput.value);
  if(!total) return;

  packed = 0;

  startScreen.style.display="none";
  mainScreen.style.display="block";

  createChart();
  update();
  saveData();
}

/* CHART */
function createChart(){
  if(chart) return;

  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"]
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        datalabels:{
          color:"white",
          formatter:(value,ctx)=>{
            let data = ctx.chart.data.datasets[0].data;
            let sum = data[0]+data[1];
            if(sum===0) return "0%";
            return ((value/sum)*100).toFixed(0)+"%";
          }
        }
      }
    },
    plugins:[ChartDataLabels]
  });
}

/* ADD */
function add(){
  let v = parseFloat(addInput.value);
  if(!v) return;

  packed += v;

  recentAdds.unshift(v);
  if(recentAdds.length > 6) recentAdds.pop();

  addInput.value = "";

  update();
  updateRecent();
  saveData();
}

/* UPDATE */
function update(){
  if(!chart || total === 0) return;

  animateNumber(totalShow, total);
  animateNumber(packedShow, packed);
  animateNumber(remainingShow, Math.max(total - packed, 0));

  chart.data.datasets[0].data = [
    Math.min(packed,total),
    Math.max(total-packed,0)
  ];
  chart.update();

  const now = new Date();
  const start = new Date(); start.setHours(8,30,0,0);
  const end = new Date(); end.setHours(21,30,0,0);

  let timeProgress = (now - start) / (end - start);
  timeProgress = Math.max(0, Math.min(1, timeProgress));

  let expected = total * timeProgress;
  let diff = expected - packed;

  let progress = total > 0 ? packed / total : 0;

  if(progress >= timeProgress + 0.02){
    statusBox.style.background="green";
    statusBox.innerText="On Track";
  }
  else if(progress >= timeProgress - 0.1){
    statusBox.style.background="orange";
    statusBox.innerText="Slightly Behind";
  }
  else{
    statusBox.style.background="red";
    statusBox.innerText="Behind";
  }

  trackText.innerText =
    diff <= 0
    ? "On track for shift pace"
    : "Need " + Math.ceil(diff) + " units to be on track";
}

/* RECENT */
function updateRecent(){
  let html = "";

  recentAdds.forEach((v,i)=>{
    let cls = i >= 3 ? "fade" : "";
    html += `<div class="recentItem ${cls}">+${v}</div>`;
  });

  recentAddsEl.innerHTML = html;
}

/* REALTIME */
sb.channel("live")
.on("postgres_changes",
  { event:"*", schema:"public", table:"production_dashboard" },
  payload => {

    if(!payload.new) return;

    total = payload.new.total || 0;
    packed = payload.new.packed || 0;
    recentAdds = payload.new.recent_adds || [];

    update();
    updateRecent();
  }
)
.subscribe();

/* INIT */
loadData();
</script>

</body>
</html>
