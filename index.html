<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

.card{
  width:560px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
}

.panel{
  width:50%;
  border:2px solid white;
  border-radius:12px;
  padding:15px;
}

#status{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
}

/* DEBUG BOX */
#debug{
  background:rgba(0,0,0,0.35);
  padding:10px;
  margin:10px auto;
  width:520px;
  font-size:12px;
  text-align:left;
  border-radius:8px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div id="debug">Loading Supabase...</div>

<div class="card">

<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Total units">
  <button onclick="start()">Start</button>
</div>

<div id="mainScreen" style="display:none;">

<div>Total: <span id="totalShow">0</span></div>
<div>Packed: <span id="packedShow">0</span></div>
<div>Remaining: <span id="remainingShow">0</span></div>

<input id="addInput" type="number" placeholder="Add units">
<button onclick="add()">Add</button>

<div class="frame">

<div class="panel">
  <div id="status">--</div>
</div>

<div class="panel">
  <canvas id="chart"></canvas>
</div>

</div>

</div>

</div>

<script>

/* =========================
   SUPABASE CLIENT
========================= */
const sb = supabase.createClient(
  "https://afakpgezcpvvnvoqcthj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmYWtwZ2V6Y3B2dm52b3FjdGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTY4ODYsImV4cCI6MjA5MzU3Mjg4Nn0.4sJ4VvVG09F0F5wsVlB3Z37v3oo9m0841NcaRr8bo4k"
);

/* =========================
   STATE
========================= */
let total = 0;
let packed = 0;
let chart;

/* =========================
   DEBUG DISPLAY
========================= */
function debug(msg){
  document.getElementById("debug").innerText = msg;
}

/* =========================
   LOAD DATA FROM SUPABASE
========================= */
async function load(){

  const { data, error } = await sb
    .from("production_dashboard")
    .select("*")
    .eq("id",1);

  debug(
`SUPABASE RESULT:
error: ${JSON.stringify(error, null, 2)}
data: ${JSON.stringify(data, null, 2)}`
  );

  if(error || !data || !data[0]){
    showStart();
    return;
  }

  total = data[0].total;
  packed = data[0].packed;

  showMain();
  createChart();
  update();
}

load();

/* =========================
   SAVE DATA
========================= */
async function save(){
  await sb.from("production_dashboard").upsert({
    id:1,
    total,
    packed
  });
}

/* =========================
   START SHIFT
========================= */
function start(){
  total = parseFloat(document.getElementById("totalInput").value);
  if(!total) return;

  packed = 0;

  showMain();
  createChart();
  update();
  save();
}

/* =========================
   ADD UNITS
========================= */
function add(){
  let v = parseFloat(document.getElementById("addInput").value);
  if(!v) return;

  packed += v;
  update();
  save();
}

/* =========================
   UI SWITCH
========================= */
function showStart(){
  startScreen.style.display="block";
  mainScreen.style.display="none";
}

function showMain(){
  startScreen.style.display="none";
  mainScreen.style.display="block";
}

/* =========================
   CHART
========================= */
function createChart(){
  if(chart) return;

  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"]
      }]
    },
    options:{
      plugins:{
        legend:{display:false}
      }
    }
  });
}

/* =========================
   UPDATE UI
========================= */
function update(){

  totalShow.innerText = total;
  packedShow.innerText = packed;
  remainingShow.innerText = Math.max(total-packed,0);

  if(chart){
    chart.data.datasets[0].data = [
      Math.min(packed,total),
      Math.max(total-packed,0)
    ];
    chart.update();
  }

  const status = document.getElementById("status");

  if(total === 0){
    status.innerText = "--";
    return;
  }

  let ratio = packed / total;

  if(ratio >= 1){
    status.innerText = "Complete";
    status.style.background = "green";
  }
  else if(ratio >= 0.8){
    status.innerText = "On Track";
    status.style.background = "orange";
  }
  else{
    status.innerText = "Behind";
    status.style.background = "red";
  }
}

</script>

</body>
</html>
