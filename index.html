<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

.card{
  width:560px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border-radius:6px;
  border:none;
  margin:10px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

.frame{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
  gap:15px;
}

.panel{
  width:48%;
  border:2px solid white;
  border-radius:12px;
  padding:15px;
}

#status{
  width:110px;
  height:110px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
}

#chartBox{
  width:180px;
  height:180px;
  margin:auto;
}
</style>
</head>

<body>

<h1>Live Production Dashboard</h1>

<div class="card">

<!-- START -->
<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Enter total units">
  <button onclick="start()">Start</button>
</div>

<!-- MAIN -->
<div id="mainScreen" style="display:none;">

  <h3>Total: <span id="totalShow">0</span> |
      Packed: <span id="packedShow">0</span></h3>

  <input id="addInput" type="number" placeholder="Add units">
  <button onclick="add()">Add</button>

  <div class="frame">

    <div class="panel">
      <div id="status">--</div>
    </div>

    <div class="panel">
      <div id="chartBox">
        <canvas id="chart"></canvas>
      </div>
    </div>

  </div>

</div>

</div>

<script>

/* ================= SUPABASE ================= */

const supabaseUrl = "https://afakpgezcpvvnvoqcthj.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmYWtwZ2V6Y3B2dm52b3FjdGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTY4ODYsImV4cCI6MjA5MzU3Mjg4Nn0.4sJ4VvVG09F0F5wsVlB3Z37v3oo9m0841NcaRr8bo4k";

const sb = supabase.createClient(supabaseUrl, supabaseKey);

/* ================= STATE ================= */

let total = 0;
let packed = 0;
let chart;

/* LOAD DATA */
async function load(){

  let { data } = await sb
    .from("production")
    .select("*")
    .eq("id",1)
    .single();

  if(data){
    total = data.total;
    packed = data.packed;

    document.getElementById("totalShow").innerText = total;
    document.getElementById("packedShow").innerText = packed;

    updateChart();
    updateStatus();
  }
}

/* START SHIFT */
async function start(){

  total = parseFloat(document.getElementById("totalInput").value);
  if(!total) return;

  await sb.from("production").upsert({
    id:1,
    total:total,
    packed:0
  });

  document.getElementById("startScreen").style.display="none";
  document.getElementById("mainScreen").style.display="block";

  initChart();
  subscribe();
  load();
}

/* ADD UNITS */
async function add(){

  let v = parseFloat(document.getElementById("addInput").value);
  if(!v) return;

  packed += v;

  await sb
    .from("production")
    .update({ packed: packed })
    .eq("id",1);

  document.getElementById("addInput").value="";
}

/* REALTIME */
function subscribe(){

  sb.channel("production")
    .on("postgres_changes",
      { event:"*", schema:"public", table:"production" },
      () => load()
    )
    .subscribe();
}

/* CHART */
function initChart(){

  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"]
      }]
    },
    options:{
      plugins:{legend:{display:false}}
    }
  });
}

function updateChart(){

  if(!chart) return;

  chart.data.datasets[0].data = [
    packed,
    Math.max(total-packed,0)
  ];

  chart.update();
}

/* STATUS */
function updateStatus(){

  let progress = packed / total;
  let box = document.getElementById("status");

  if(progress >= 0.9){
    box.style.background="green";
    box.innerText="On Track";
  }
  else if(progress >= 0.7){
    box.style.background="orange";
    box.innerText="Warning";
  }
  else{
    box.style.background="red";
    box.innerText="Behind";
  }
}

/* INITIAL LOAD */
load();

</script>

</body>
</html>
