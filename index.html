<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

h1{margin-bottom:20px}

.card{
  width:560px;
  margin:auto;
  background:rgba(255,255,255,0.12);
  border-radius:15px;
  padding:20px;
  backdrop-filter:blur(10px);
}

input{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
  width:180px;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:white;
  font-weight:bold;
}

button:hover{opacity:0.85}

.danger{
  background:#ff4d4d;
  color:white;
}

.inline{
  font-size:20px;
  margin:10px;
}

/* MAIN FRAME (NO FILL, ONLY OUTLINES) */
.frame{
  margin-top:20px;
  display:flex;
  justify-content:space-between;
  align-items:stretch;
  gap:20px;
}

/* LEFT PANEL */
.leftPanel{
  width:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;

  border:2px solid white;
  border-radius:12px;
  padding:15px;
}

/* RIGHT PANEL */
.rightPanel{
  width:50%;
  display:flex;
  flex-direction:column;
  align-items:center;

  border:2px solid white;
  border-radius:12px;
  padding:15px;
}

/* STATUS */
#statusCircle{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:14px;
  background:gray;
  color:white;
}

/* PIE */
#chartContainer{
  width:180px;
  height:180px;
}

/* LEGEND */
#legendNote{
  font-size:12px;
  margin-bottom:10px;
  color:white;
}

/* REQUIRED */
#requiredText{
  font-size:13px;
  margin-top:10px;
}

/* END BUTTON AT BOTTOM */
.bottomButton{
  margin-top:auto;
  width:100%;
}

/* SUMMARY */
#summary{
  display:none;
  margin-top:20px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<!-- START -->
<div id="startScreen">
  <p>Enter total units for today's production:</p>
  <input type="number" id="totalInput">
  <button onclick="start()">Start</button>
</div>

<!-- MAIN -->
<div id="mainScreen" style="display:none;">

  <div class="inline">Total: <span id="totalShow">0</span></div>
  <div class="inline">Packed: <span id="packedShow">0</span></div>

  <div>
    <input id="addInput" type="number" placeholder="Add units">
    <button onclick="add()">Add</button>
  </div>

  <!-- DASHBOARD -->
  <div class="frame">

    <!-- LEFT -->
    <div class="leftPanel">

      <div id="statusCircle">--</div>

      <div id="requiredText">--</div>

      <!-- END BUTTON AT BOTTOM -->
      <div class="bottomButton">
        <button class="danger" onclick="endProduction()">
          End Shift
        </button>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="rightPanel">

      <div id="legendNote">🟢 Packed | 🔴 Remaining</div>

      <div id="chartContainer">
        <canvas id="chart"></canvas>
      </div>

    </div>

  </div>

</div>

<div id="summary"></div>

</div>

<script>

/* AUTH */
let unlocked=false;

const passwords=[
  "Kyle","Sofiya","Anjali","Krithika","Niroshan",
  "Lokesh","Elamari","Osama","Netra","Thishanthan"
];

function requestAccess(){
  let pass=prompt("Enter password:");
  if(passwords.includes(pass)){
    unlocked=true;
    sessionStorage.setItem("auth","true");
  } else {
    document.body.innerHTML="<h2 style='color:white;text-align:center;margin-top:100px;'>Locked</h2>";
  }
}

window.onload=function(){
  if(sessionStorage.getItem("auth")==="true"){
    unlocked=true;
  } else requestAccess();
};

/* CORE */
let total=0;
let packed=0;
let chart;

const startShift=8.5;
const endShift=21.5;

function nowDecimal(){
  const d=new Date();
  return d.getHours()+d.getMinutes()/60;
}

function timeProgress(){
  const n=nowDecimal();
  if(n<=startShift)return 0;
  if(n>=endShift)return 1;
  return (n-startShift)/(endShift-startShift);
}

/* START */
function start(){

  total=parseFloat(document.getElementById("totalInput").value);
  if(!total)return;

  document.getElementById("startScreen").style.display="none";
  document.getElementById("mainScreen").style.display="block";

  document.getElementById("totalShow").innerText=total;

  chart=new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"]
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        datalabels:{
          color:"white",
          formatter:(v,c)=>{
            const d=c.chart.data.datasets[0].data;
            const t=d[0]+d[1];
            return ((v/t)*100).toFixed(0)+"%";
          }
        }
      }
    },
    plugins:[ChartDataLabels]
  });

  updateAll();
}

/* ADD */
function add(){

  let v=parseFloat(document.getElementById("addInput").value);
  if(!v)return;

  packed+=v;
  document.getElementById("packedShow").innerText=packed;
  document.getElementById("addInput").value="";

  updateAll();
}

/* UPDATE */
function updateAll(){

  let done=Math.min(packed,total);
  let left=Math.max(total-packed,0);

  chart.data.datasets[0].data=[done,left];
  chart.update();

  let prog=packed/total;
  let time=timeProgress();

  const box=document.getElementById("statusCircle");

  if(prog>=time){
    box.style.background="green";
    box.innerText="On Track";
  } else if(prog>=time-0.1){
    box.style.background="orange";
    box.innerText="Slightly Behind";
  } else {
    box.style.background="red";
    box.innerText="Behind";
  }

  updateRequired();
}

/* REQUIRED */
function updateRequired(){

  const expected=total*timeProgress();
  const diff=expected-packed;

  const el=document.getElementById("requiredText");

  if(diff<=0){
    el.innerText="On track (0 units needed)";
    el.style.color="#00ff88";
  } else {
    el.innerText="Need "+Math.ceil(diff)+" units to be on track";
    el.style.color="orange";
  }
}

/* END */
function endProduction(){

  let pass=prompt("Enter password:");
  if(!passwords.includes(pass)){
    alert("Access denied");
    return;
  }

  sessionStorage.removeItem("auth");

  const pushed=total-packed;
  const percent=((packed/total)*100).toFixed(1);

  document.getElementById("mainScreen").style.display="none";
  document.getElementById("summary").style.display="block";

  document.getElementById("summary").innerHTML=`
    <h2>Final Report</h2>
    <p>Packed: ${packed}</p>
    <p>Pushed: ${pushed}</p>
    <p>Completed: ${percent}%</p>
  `;
}

setInterval(updateAll,60000);

</script>

</body>
</html>
