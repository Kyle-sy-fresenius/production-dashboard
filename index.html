<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

.card{
  width:560px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

.inline{
  font-size:20px;
  margin:10px;
}

.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
}

.panel{
  width:50%;
  border:2px solid white;
  border-radius:12px;
  padding:15px;
}

#status{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
}

#chartBox{
  width:160px;
  height:160px;
}

.chartRow{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

#recentAdds{
  width:55px;
  font-size:11px;
  text-align:left;
}

.recentItem{
  margin:3px 0;
  font-weight:bold;
}

.fade{
  opacity:0.35;
}

#trackText{
  margin-top:10px;
  font-size:14px;
}

.bottom{
  margin-top:25px;
  display:flex;
  justify-content:center;
}

#summary{
  display:none;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<div id="startScreen">
  <p>Enter total units for today's production:</p>
  <input id="totalInput" type="number">
  <button onclick="start()">Start</button>
</div>

<div id="mainScreen" style="display:none;">

  <div class="inline">Total: <span id="totalShow">0</span></div>
  <div class="inline">Packed: <span id="packedShow">0</span></div>
  <div class="inline">Remaining: <span id="remainingShow">0</span></div>

  <div>
    <input id="addInput" type="number" placeholder="Add units">
    <button onclick="add()">Add</button>
  </div>

  <div class="frame">

    <div class="panel">
      <div id="status">--</div>
      <div id="trackText">--</div>
    </div>

    <div class="panel">
      <div style="font-size:12px;margin-bottom:8px;">🟢 Packed | 🔴 Remaining</div>

      <div class="chartRow">
        <div id="chartBox">
          <canvas id="chart"></canvas>
        </div>

        <div id="recentAdds"></div>
      </div>
    </div
