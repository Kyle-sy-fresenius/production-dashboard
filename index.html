<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

.card{
  width:560px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
}

.panel{
  width:50%;
  border:2px solid white;
  border-radius:12px;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* STATUS GLOWING RING */
#status{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 0 10px rgba(255,255,255,0.2);
}

/* PIE */
#chartBox{
  width:160px;
  height:160px;
}

#recentAdds{
  width:60px;
  font-size:11px;
  text-align:left;
}

.recentItem{margin:2px 0;}
.fade{opacity:0.35;}

#trackText{
  margin-top:10px;
  font-size:14px;
}

#summary{
  display:none;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<!-- START -->
<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Total units">
  <button onclick="start()">Start</button>
</div>

<!-- MAIN -->
<div id="mainScreen" style="display:none;">

<div>Total: <span id="totalShow">0</span></div>
<div>Packed: <span id="packedShow">0</span></div>
<div>Remaining: <span id="remainingShow">0</span></div>

<input id="addInput" type="number" placeholder="Add units">
<button onclick="add()">Add</button>

<div class="frame">

<!-- STATUS -->
<div class="panel">
  <div id="status">--</div>
  <div id="trackText">--</div>
</div>

<!-- PIE + LEGEND + LIST -->
<div class="panel">

<div style="font-size:12px;margin-bottom:5px;">
🟢 Packed | 🔴 Remaining
</div>

<div style="display:flex;gap:10px;align-items:center;">
  <div id="chartBox">
    <canvas id="chart"></canvas>
  </div>

  <div id="recentAdds"></div>
</div>

</div>

</div>

<button onclick="endShift()" style="margin-top:20px;background:#ff4d4d;color:white;">
  End Production
</button>

</div>

<div id="summary"></div>

</div>

<script>

/* =========================
   SUPABASE SETUP
========================= */
const sb = supabase.createClient(
  "https://afakpgezcpvvnvoqcthj.supabase.co",
  "YOUR_ANON_KEY"
);

/* STATE */
let total = 0;
let packed = 0;
let recentAdds = [];
let chart;

/* =========================
   LOAD DATA (FIXED)
========================= */
async function loadData(){
  const { data } = await sb
    .from("production_dashboard")
    .select("*")
    .eq("id",1)
    .maybeSingle();

  if(data){
    total = data.total || 0;
    packed = data.packed || 0;
    recentAdds = data.recent_adds || [];
  }

  if(total > 0){
    startScreen.style.display="none";
    mainScreen.style.display="block";
    createChart();
    update();
    updateRecent();
  }
}

loadData();

/* =========================
   SAVE DATA (FIXED)
========================= */
async function saveData(){
  await sb.from("production_dashboard").upsert({
    id:1,
    total,
    packed,
    recent_adds: recentAdds
  });
}

/* START */
function start(){
  const v = parseFloat(document.getElementById("totalInput").value);
  if(isNaN(v) || v <= 0) return;

  total = v;
  packed = 0;

  startScreen.style.display="none";
  mainScreen.style.display="block";

  createChart();
  update();
  saveData();
}

/* CHART */
function createChart(){
  if(chart) return;

  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"],
        borderWidth:0
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        datalabels:{
          color:"white",
          font:{size:11,weight:"bold"},
          formatter:(value,ctx)=>{
            const data = ctx.chart.data.datasets[0].data;
            const sum = data.reduce((a,b)=>a+b,0);
            if(sum===0) return "0%";
            return ((value/sum)*100).toFixed(0)+"%";
          }
        }
      }
    },
    plugins:[ChartDataLabels]
  });
}

/* ADD */
async function add(){
  const v = parseFloat(document.getElementById("addInput").value);
  if(isNaN(v)) return;

  packed += v;

  recentAdds.unshift(v);
  if(recentAdds.length > 6) recentAdds.pop();

  document.getElementById("addInput").value="";

  update();
  updateRecent();

  await saveData();
}

/* UPDATE */
function update(){
  totalShow.innerText = total;
  packedShow.innerText = packed;
  remainingShow.innerText = Math.max(total-packed,0);

  chart.data.datasets[0].data = [
    Math.min(packed,total),
    Math.max(total-packed,0)
  ];
  chart.update();

  const now = new Date();
  const start = new Date(); start.setHours(8,30,0,0);
  const end = new Date(); end.setHours(21,30,0,0);

  let timeProgress = (now-start)/(end-start);
  timeProgress = Math.max(0,Math.min(1,timeProgress));

  let expected = total * timeProgress;

  const status = document.getElementById("status");
  const track = document.getElementById("trackText");

  let ratio = total ? packed/total : 0;

  if(ratio >= timeProgress){
    status.style.background="rgba(0,255,136,0.2)";
    status.style.boxShadow="0 0 15px #00ff88";
    status.innerText="On Track";
  } else {
    status.style.background="rgba(255,0,0,0.2)";
    status.style.boxShadow="0 0 15px red";
    status.innerText="Behind";
  }

  track.innerText =
    packed >= expected
    ? "On track"
    : "Need " + Math.ceil(expected-packed) + " units";
}

/* RECENT */
function updateRecent(){
  let html = "";

  recentAdds.forEach((v,i)=>{
    html += `<div class="recentItem ${i>=3?'fade':''}">+${v}</div>`;
  });

  document.getElementById("recentAdds").innerHTML = html;
}

/* END SHIFT */
function endShift(){
  mainScreen.style.display="none";
  summary.style.display="block";

  const remaining = total - packed;
  const percent = total ? ((packed/total)*100).toFixed(1) : 0;

  summary.innerHTML = `
    <h2>Shift Complete</h2>
    <p>Packed: ${packed}</p>
    <p>Remaining: ${remaining}</p>
    <p>Completion: ${percent}%</p>
    <button onclick="location.reload()">Restart</button>
  `;
}

</script>

</body>
</html>
