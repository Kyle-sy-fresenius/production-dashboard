<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

.card{
  width:560px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
}

.panel{
  width:50%;
  border:2px solid white;
  border-radius:12px;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* STATUS */
#status{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 0 10px rgba(255,255,255,0.2);
}

/* PIE */
#chartBox{
  width:160px;
  height:160px;
}

/* RECENT */
#recentAdds{
  width:60px;
  font-size:11px;
  text-align:left;
}

.recentItem{margin:2px 0;}
.fade{opacity:0.35;}

#trackText{
  margin-top:10px;
  font-size:14px;
}

/* DEBUG BOX */
#debug{
  background:rgba(0,0,0,0.4);
  padding:10px;
  margin:10px auto;
  width:520px;
  font-size:12px;
  text-align:left;
  border-radius:8px;
  display:none;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div id="debug"></div>

<div class="card">

<!-- START -->
<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Total units">
  <button onclick="start()">Start</button>
</div>

<!-- MAIN -->
<div id="mainScreen" style="display:none;">

<div>Total: <span id="totalShow">0</span></div>
<div>Packed: <span id="packedShow">0</span></div>
<div>Remaining: <span id="remainingShow">0</span></div>

<input id="addInput" type="number" placeholder="Add units">
<button onclick="add()">Add</button>

<div class="frame">

<!-- STATUS -->
<div class="panel">
  <div id="status">--</div>
  <div id="trackText">--</div>
</div>

<!-- PIE -->
<div class="panel">

<div style="font-size:12px;margin-bottom:6px;">
🟢 Packed | 🔴 Remaining
</div>

<div style="display:flex;gap:10px;align-items:center;">
  <div id="chartBox">
    <canvas id="chart"></canvas>
  </div>

  <div id="recentAdds"></div>
</div>

</div>

</div>

</div>

</div>

<script>

/* =========================
   SUPABASE
========================= */
const sb = supabase.createClient(
  "https://afakpgezcpvvnvoqcthj.supabase.co",
  "YOUR_ANON_KEY"
);

/* STATE */
let total = 0;
let packed = 0;
let recentAdds = [];
let chart;

/* =========================
   DEBUG HELPERS
========================= */
function showDebug(msg){
  const d = document.getElementById("debug");
  d.style.display = "block";
  d.innerText = msg;
}

/* =========================
   LOAD DATA (DEBUG ENABLED)
========================= */
async function loadData(){

  const { data, error } = await sb
    .from("production_dashboard")
    .select("*")
    .eq("id",1);

  showDebug(
`SUPABASE RESPONSE:
error: ${JSON.stringify(error, null, 2)}
data: ${JSON.stringify(data, null, 2)}`
  );

  if(error || !data || !data[0]){
    showStart();
    return;
  }

  const row = data[0];

  total = row.total || 0;
  packed = row.packed || 0;
  recentAdds = row.recent_adds || [];

  if(total > 0){
    showMain();
    createChart();
    update();
    updateRecent();
  } else {
    showStart();
  }
}

loadData();

/* =========================
   SAVE
========================= */
async function saveData(){
  await sb.from("production_dashboard").upsert({
    id:1,
    total,
    packed,
    recent_adds: recentAdds
  });
}

/* UI HELPERS */
function showStart(){
  startScreen.style.display="block";
  mainScreen.style.display="none";
}

function showMain(){
  startScreen.style.display="none";
  mainScreen.style.display="block";
}

/* START */
function start(){
  const v = parseFloat(document.getElementById("totalInput").value);
  if(isNaN(v) || v <= 0) return;

  total = v;
  packed = 0;

  showMain();
  createChart();
  update();
  saveData();
}

/* CHART */
function createChart(){
  if(chart) return;

  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"]
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        datalabels:{
          color:"white",
          formatter:(v,ctx)=>{
            const d = ctx.chart.data.datasets[0].data;
            const s = d[0]+d[1];
            return s ? ((v/s)*100).toFixed(0)+"%" : "0%";
          }
        }
      }
    },
    plugins:[ChartDataLabels]
  });
}

/* ADD */
async function add(){
  const v = parseFloat(document.getElementById("addInput").value);
  if(isNaN(v)) return;

  packed += v;

  recentAdds.unshift(v);
  if(recentAdds.length > 6) recentAdds.pop();

  document.getElementById("addInput").value="";

  update();
  updateRecent();
  await saveData();
}

/* UPDATE */
function update(){
  totalShow.innerText = total;
  packedShow.innerText = packed;
  remainingShow.innerText = Math.max(total-packed,0);

  chart.data.datasets[0].data = [
    Math.min(packed,total),
    Math.max(total-packed,0)
  ];
  chart.update();

  const now = new Date();
  const start = new Date(); start.setHours(8,30,0,0);
  const end = new Date(); end.setHours(21,30,0,0);

  let timeProgress = (now-start)/(end-start);
  timeProgress = Math.max(0,Math.min(1,timeProgress));

  let expected = total * timeProgress;

  const status = document.getElementById("status");
  const track = document.getElementById("trackText");

  if(total === 0) return;

  if(packed >= expected){
    status.style.background="rgba(0,255,136,0.2)";
    status.style.boxShadow="0 0 15px #00ff88";
    status.innerText="On Track";
  } else {
    status.style.background="rgba(255,0,0,0.2)";
    status.style.boxShadow="0 0 15px red";
    status.innerText="Behind";
  }

  track.innerText =
    packed >= expected
    ? "On track"
    : "Need " + Math.ceil(expected-packed) + " units";
}

/* RECENT */
function updateRecent(){
  let html = "";
  recentAdds.forEach((v,i)=>{
    html += `<div class="recentItem ${i>=3?'fade':''}">+${v}</div>`;
  });
  document.getElementById("recentAdds").innerHTML = html;
}

</script>

</body>
</html>
