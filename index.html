<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

.card{
  width:560px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{opacity:0.85}

.inline{
  font-size:20px;
  margin:10px;
}

/* FRAME */
.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
}

.panel{
  width:50%;
  border:2px solid white;
  border-radius:12px;
  padding:15px;
}

/* STATUS */
#status{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
}

/* CHART */
#chartBox{
  width:180px;
  height:180px;
  margin:auto;
}

/* LEGEND */
#legend{
  font-size:12px;
  margin-bottom:10px;
}

/* TRACK TEXT */
#trackText{
  margin-top:10px;
  font-size:14px;
}

/* END BUTTON */
.bottom{
  margin-top:25px;
  display:flex;
  justify-content:center;
}

/* SUMMARY */
#summary{
  display:none;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<!-- START -->
<div id="startScreen">
  <p>Enter total units for today's production:</p>
  <input id="totalInput" type="number">
  <button onclick="start()">Start</button>
</div>

<!-- MAIN -->
<div id="mainScreen" style="display:none;">

  <div class="inline">Total: <span id="totalShow"></span></div>
  <div class="inline">Packed: <span id="packedShow"></span></div>

  <div>
    <input id="addInput" type="number" placeholder="Add units">
    <button onclick="add()">Add</button>
  </div>

  <div class="frame">

    <!-- STATUS -->
    <div class="panel">
      <div id="status">--</div>
      <div id="trackText">--</div>
    </div>

    <!-- PIE -->
    <div class="panel">

      <div id="legend">🟢 Packed | 🔴 Remaining</div>

      <div id="chartBox">
        <canvas id="chart"></canvas>
      </div>

    </div>

  </div>

  <div class="bottom">
    <button style="background:#ff4d4d;color:white" onclick="endShift()">
      End Shift
    </button>
  </div>

</div>

<!-- SUMMARY -->
<div id="summary"></div>

</div>

<script>

/* STATE */
let total=0;
let packed=0;
let chart;

/* START */
function start(){

  total = parseFloat(document.getElementById("totalInput").value);
  if(!total) return;

  document.getElementById("startScreen").style.display="none";
  document.getElementById("mainScreen").style.display="block";

  document.getElementById("totalShow").innerText=total;

  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"]
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        datalabels:{
          color:"white",
          formatter:(value,ctx)=>{
            let data = ctx.chart.data.datasets[0].data;
            let sum = data[0] + data[1];
            return ((value/sum)*100).toFixed(0) + "%";
          }
        }
      }
    },
    plugins:[ChartDataLabels]
  });

  update();
}

/* ADD */
function add(){

  let v = parseFloat(document.getElementById("addInput").value);
  if(!v) return;

  packed += v;

  document.getElementById("packedShow").innerText=packed;
  document.getElementById("addInput").value="";

  update();
}

/* UPDATE (TIME BASED) */
function update(){

  let done = Math.min(packed,total);
  let left = Math.max(total-packed,0);

  chart.data.datasets[0].data = [done,left];
  chart.update();

  /* ===== TIME LOGIC ===== */

  const now = new Date();

  const start = new Date();
  start.setHours(8,30,0,0);

  const end = new Date();
  end.setHours(21,30,0,0);

  let timeProgress = (now - start) / (end - start);
  timeProgress = Math.max(0,Math.min(1,timeProgress));

  let expected = total * timeProgress;

  let diff = expected - packed;

  /* ===== STATUS ===== */

  let progress = packed / total;
  let box = document.getElementById("status");

  if(progress >= timeProgress){
    box.style.background="green";
    box.innerText="On Track";
  }
  else if(progress >= timeProgress - 0.1){
    box.style.background="orange";
    box.innerText="Slightly Behind";
  }
  else{
    box.style.background="red";
    box.innerText="Behind";
  }

  /* ===== TRACK TEXT ===== */

  document.getElementById("trackText").innerText =
    diff <= 0
    ? "On track for shift pace"
    : "Need " + Math.ceil(diff) + " units to be on track";
}

/* END SHIFT */
function endShift(){

  let pushed = total - packed;
  let percent = ((packed/total)*100).toFixed(1);

  document.getElementById("mainScreen").style.display="none";
  document.getElementById("summary").style.display="block";

  document.getElementById("summary").innerHTML=`
    <h2>Shift Complete</h2>
    <p>Packed: ${packed}</p>
    <p>Remaining: ${pushed}</p>
    <p>Completion: ${percent}%</p>
    <button onclick="location.reload()">Restart</button>
  `;
}

</script>

</body>
</html>
