<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

.card{
  width:560px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

/* layout */
.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
}

.panel{
  width:50%;
  border:2px solid white;
  border-radius:12px;
  padding:15px;
}

/* status circle */
#status{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
}

/* chart sizing FIX */
#chartBox{
  width:120px;
  height:120px;
  margin:auto;
  display:flex;
  justify-content:center;
  align-items:center;
}

canvas{
  width:120px !important;
  height:120px !important;
}

/* END SCREEN */
#summary{
  display:none;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<!-- START -->
<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Total units">
  <button onclick="start()">Start</button>
</div>

<!-- MAIN -->
<div id="mainScreen" style="display:none;">

<div>Total: <span id="totalShow">0</span></div>
<div>Packed: <span id="packedShow">0</span></div>
<div>Remaining: <span id="remainingShow">0</span></div>

<input id="addInput" type="number" placeholder="Add units">
<button onclick="add()">Add</button>

<div class="frame">

<!-- STATUS -->
<div class="panel">
  <div id="status">--</div>
  <div id="trackText">--</div>
</div>

<!-- CHART -->
<div class="panel">
  <div id="chartBox">
    <canvas id="chart"></canvas>
  </div>
</div>

</div>

<button onclick="endShift()" style="margin-top:20px;background:#ff4d4d;color:white;">
  End Production
</button>

</div>

<!-- SUMMARY -->
<div id="summary"></div>

</div>

<script>
const sb = supabase.createClient(
  "https://afakpgezcpvvnvoqcthj.supabase.co",
  "YOUR_ANON_KEY"
);

let total = 0;
let packed = 0;
let chart;

/* START */
function start(){
  const v = parseFloat(document.getElementById("totalInput").value);
  if(isNaN(v) || v <= 0) return;

  total = v;
  packed = 0;

  document.getElementById("startScreen").style.display="none";
  document.getElementById("mainScreen").style.display="block";

  createChart();
  update();
}

/* CHART */
function createChart(){
  if(chart) return;

  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"]
      }]
    },

    options:{
      plugins:{
        legend:{
          display:true,
          position:"bottom",
          align:"center",
          labels:{
            color:"white",
            font:{size:10},
            boxWidth:8,
            padding:6
          }
        },

        datalabels:{
          color:"white",
          font:{weight:"bold",size:10},
          formatter:(value,ctx)=>{
            let data = ctx.chart.data.datasets[0].data;
            let sum = data.reduce((a,b)=>a+b,0);
            if(sum === 0) return "0%";
            return ((value/sum)*100).toFixed(0) + "%";
          }
        }
      }
    },

    plugins:[ChartDataLabels]
  });
}

/* ADD */
function add(){
  const v = parseFloat(document.getElementById("addInput").value);
  if(isNaN(v)) return;

  packed += v;
  document.getElementById("addInput").value="";

  update();
  save();
}

/* UPDATE UI */
function update(){
  document.getElementById("totalShow").innerText = total;
  document.getElementById("packedShow").innerText = packed;
  document.getElementById("remainingShow").innerText = Math.max(total-packed,0);

  chart.data.datasets[0].data = [
    Math.min(packed,total),
    Math.max(total-packed,0)
  ];
  chart.update();

  const now = new Date();
  const start = new Date(); start.setHours(8,30,0,0);
  const end = new Date(); end.setHours(21,30,0,0);

  let progress = (now-start)/(end-start);
  progress = Math.max(0,Math.min(1,progress));

  let expected = total * progress;

  let status = document.getElementById("status");
  let track = document.getElementById("trackText");

  if(packed/total >= progress){
    status.style.background="green";
    status.innerText="On Track";
  } else {
    status.style.background="red";
    status.innerText="Behind";
  }

  track.innerText =
    packed >= expected
    ? "On track"
    : "Need " + Math.ceil(expected-packed) + " units";
}

/* SAVE */
async function save(){
  await sb.from("production_dashboard").upsert({
    id:1,
    total,
    packed
  });
}

/* REALTIME */
sb.channel("live")
.on("postgres_changes",
  { event:"*", schema:"public", table:"production_dashboard" },
  payload => {
    if(!payload.new) return;

    total = payload.new.total || 0;
    packed = payload.new.packed || 0;

    update();
  }
)
.subscribe();

/* 🔁 FALLBACK SYNC (fix phone issue) */
setInterval(async () => {
  const { data } = await sb
    .from("production_dashboard")
    .select("*")
    .eq("id",1)
    .single();

  if(!data) return;

  total = data.total || 0;
  packed = data.packed || 0;

  update();
}, 5000);

/* END SHIFT */
function endShift(){
  document.getElementById("mainScreen").style.display="none";
  document.getElementById("summary").style.display="block";

  const remaining = total - packed;
  const percent = total ? ((packed/total)*100).toFixed(1) : 0;

  document.getElementById("summary").innerHTML = `
    <h2>Shift Complete</h2>
    <p>Packed: ${packed}</p>
    <p>Remaining: ${remaining}</p>
    <p>Completion: ${percent}%</p>
    <button onclick="location.reload()">Restart</button>
  `;
}
</script>

</body>
</html>
