<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

.card{
  width:560px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
}

.panel{
  width:50%;
  border:2px solid white;
  border-radius:12px;
  padding:15px;
}

#status{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
}

#chartBox{
  width:160px;
  height:160px;
}

.chartRow{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

#recentAdds{
  width:60px;
  font-size:11px;
  text-align:left;
}

.recentItem{margin:2px 0;}
.fade{opacity:0.35;}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Total units">
  <button onclick="start()">Start</button>
</div>

<div id="mainScreen" style="display:none;">

<div>Total: <span id="totalShow">0</span></div>
<div>Packed: <span id="packedShow">0</span></div>
<div>Remaining: <span id="remainingShow">0</span></div>

<input id="addInput" type="number" placeholder="Add units">
<button onclick="add()">Add</button>

<div class="frame">

<div class="panel">
  <div id="status">--</div>
  <div id="trackText">--</div>
</div>

<div class="panel">
  <div class="chartRow">
    <div id="chartBox">
      <canvas id="chart"></canvas>
    </div>
    <div id="recentAdds"></div>
  </div>
</div>

</div>

</div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://afakpgezcpvvnvoqcthj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmYWtwZ2V6Y3B2dm52b3FjdGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTY4ODYsImV4cCI6MjA5MzU3Mjg4Nn0.4sJ4VvVG09F0F5wsVlB3Z37v3oo9m0841NcaRr8bo4k"
);

let total=0;
let packed=0;
let chart;
let recentAdds=[];

/* LOAD */
async function loadData(){
  const { data } = await supabase
    .from("production_dashboard")
    .select("*")
    .eq("id",1)
    .single();

  if(!data) return;

  total=data.total||0;
  packed=data.packed||0;
  recentAdds=data.recent_adds||[];

  updateRecentAdds();

  if(total>0){
    startScreen.style.display="none";
    mainScreen.style.display="block";
    createChart();
    update();
  }
}

/* SAVE */
async function saveData(){
  await supabase
    .from("production_dashboard")
    .upsert({
      id:1,
      total,
      packed,
      recent_adds:recentAdds,
      updated_at:new Date().toISOString()
    });
}

/* START */
function start(){
  total=parseFloat(totalInput.value);
  if(!total) return;

  packed=0;

  startScreen.style.display="none";
  mainScreen.style.display="block";

  createChart();
  update();
  saveData();
}

/* CHART */
function createChart(){
  chart=new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"]
      }]
    }
  });
}

/* ADD */
function add(){
  let v=parseFloat(addInput.value);
  if(!v) return;

  packed+=v;

  recentAdds.unshift(v);
  if(recentAdds.length>6) recentAdds.pop();

  updateRecentAdds();

  addInput.value="";
  update();
  saveData();
}

/* UPDATE */
function update(){
  totalShow.innerText=total;
  packedShow.innerText=packed;
  remainingShow.innerText=Math.max(total-packed,0);

  chart.data.datasets[0].data=[packed,total-packed];
  chart.update();
}

/* RECENT */
function updateRecentAdds(){
  let html="";
  recentAdds.forEach((v,i)=>{
    let cls=i>=3?"fade":"";
    html+=`<div class="recentItem ${cls}">+${v}</div>`;
  });
  recentAddsEl=document.getElementById("recentAdds");
  if(recentAddsEl) recentAddsEl.innerHTML=html;
}

/* REALTIME */
supabase
.channel("live")
.on("postgres_changes",
{event:"*",schema:"public",table:"production_dashboard"},
payload=>{
  total=payload.new.total;
  packed=payload.new.packed;
  recentAdds=payload.new.recent_adds||[];

  update();
  updateRecentAdds();
})
.subscribe();

loadData();
</script>

</body>
</html>
