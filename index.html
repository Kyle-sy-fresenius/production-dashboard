<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:25px;
}

.card{
  width:700px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:8px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

.frame{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:20px;
}

.panel{
  width:48%;
  height:260px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border:2px solid white;
  border-radius:12px;
  padding:12px;
  box-sizing:border-box;
}

#statusRing{
  width:160px;
  height:160px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:15px;
  text-align:center;
  border:6px solid rgba(255,255,255,0.2);
  box-shadow:0 0 20px rgba(255,255,255,0.2);
  transition:0.3s;
  padding:10px;
  box-sizing:border-box;
}

.centerPanel{
  width:48%;
  height:260px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border:2px solid white;
  border-radius:12px;
  padding:12px;
  box-sizing:border-box;
}

#chartBox{
  width:180px;
  height:180px;
}

#chart{
  filter:drop-shadow(0 0 12px #00ff88) drop-shadow(0 0 10px #ff3b3b);
}

.recentMini{
  text-align:left;
  font-size:14px;
  line-height:22px;
  padding-left:10px;
  min-width:120px;
}

.recentItem{
  margin:3px 0;
}

.fade{
  opacity:0.5;
}

#trackText{
  margin-top:10px;
  font-size:14px;
}

#summaryScreen{
  display:none;
}

.summaryBox{
  margin-top:40px;
  font-size:22px;
  line-height:40px;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Total units">
  <button onclick="start()">Start</button>
</div>

<div id="mainScreen" style="display:none;">

<div>Total: <span id="totalShow">0</span></div>
<div>Packed: <span id="packedShow">0</span></div>
<div>Remaining: <span id="remainingShow">0</span></div>

<input id="addInput" type="number" placeholder="Add units">
<button onclick="add()">Add</button>

<div class="frame">

<div class="panel">
  <div id="statusRing">--</div>
  <div id="trackText"></div>
</div>

<div class="centerPanel">

  <div id="chartBox">
    <canvas id="chart"></canvas>
  </div>

  <div class="recentMini" id="recentTop"></div>

</div>

</div>

<button onclick="endShift()" style="margin-top:15px;background:#ff4d4d;color:white;">
End Production
</button>

</div>

<div id="summaryScreen">

  <h2>Shift Summary</h2>

  <div class="summaryBox">
    Packed: <span id="sumPacked"></span><br>
    Total: <span id="sumTotal"></span><br>
    Percentage: <span id="sumPercent"></span>
  </div>

  <button onclick="backToDashboard()">Back to Dashboard</button>

</div>

</div>

<script>

const sb = supabase.createClient(
  "https://afakpgezcpvvnvoqcthj.supabase.co",
  "sb_publishable_n7KfiuQXIE_hekGgd3eXsQ_gEqaJ_9Y"
);

let total = 0;
let packed = 0;
let recent = [];
let chart;
let started = false;

async function load(){

  const { data } = await sb
    .from("production_dashboard")
    .select("*")
    .eq("id",1)
    .single();

  if(!data) return;

  total = data.total || 0;
  packed = data.packed || 0;
  recent = data.recent_adds || [];

  started = total > 0;

  showMain();
  createChart();
  update();
  renderRecent();
}

load();

function start(){

  total = parseFloat(totalInput.value);

  if(isNaN(total) || total <= 0) return;

  packed = 0;
  recent = [];
  started = true;

  save();
  showMain();
  createChart();
  update();
  renderRecent();
}

function add(){

  let v = parseFloat(addInput.value);

  if(isNaN(v) || v <= 0) return;

  packed += v;
  recent.unshift(v);

  if(recent.length > 50) recent.pop();

  addInput.value = "";

  save();
  update();
  renderRecent();
}

async function save(){

  await sb.from("production_dashboard").upsert({
    id:1,
    total,
    packed,
    recent_adds:recent
  });
}

function showMain(){

  startScreen.style.display = "none";
  mainScreen.style.display = "block";
  summaryScreen.style.display = "none";
}

function endShift(){

  const password = prompt("Enter password:");

  const allowed = [
    "Kyle","Sofiya","Anjali","Osama","Elamari",
    "Elham","Krithika","Niroshan","Lokesh","Netra"
  ];

  if(!allowed.includes(password)){
    alert("Incorrect password");
    return;
  }

  let percent = total
    ? ((packed/total)*100).toFixed(1)
    : 0;

  sumPacked.innerText = packed;
  sumTotal.innerText = total;
  sumPercent.innerText = percent + "%";

  mainScreen.style.display = "none";
  summaryScreen.style.display = "block";
}

async function backToDashboard(){

  total = 0;
  packed = 0;
  recent = [];
  started = false;

  await sb.from("production_dashboard").upsert({
    id:1,
    total:0,
    packed:0,
    recent_adds:[]
  });

  totalInput.value = "";
  addInput.value = "";

  summaryScreen.style.display = "none";
  mainScreen.style.display = "none";
  startScreen.style.display = "block";
}

function createChart(){

  if(chart) return;

  chart = new Chart(document.getElementById("chart"),{
    type:"doughnut",

    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:[
          "#00ff88",
          "#ff3b3b"
        ],
        borderWidth:0,
        hoverOffset:0
      }]
    },

    options:{
      responsive:true,
      cutout:"72%",

      plugins:{
        legend:{
          display:false
        },

        datalabels:{
          color:"#fff",
          font:{
            weight:"bold",
            size:16
          },

          formatter:(v,ctx)=>{
            const d = ctx.chart.data.datasets[0].data;
            const sum = d[0] + d[1];

            return sum
              ? ((v/sum)*100).toFixed(0)+"%"
              : "0%";
          }
        }
      }
    },

    plugins:[ChartDataLabels]
  });
}

function update(){

  totalShow.innerText = total;
  packedShow.innerText = packed;
  remainingShow.innerText = Math.max(total-packed,0);

  chart.data.datasets[0].data = [
    Math.min(packed,total),
    Math.max(total-packed,0)
  ];

  chart.update();

  const ring = document.getElementById("statusRing");

  const now = new Date();
  const minutes = now.getHours() * 60 + now.getMinutes();

  let target = 0;

  if(minutes >= 20 * 60){
    target = 10000;
  }
  else if(minutes >= 15 * 60 + 30){
    target = 5000;
  }
  else if(minutes >= 13 * 60){
    target = 3500;
  }
  else if(minutes >= 11 * 60){
    target = 2000;
  }
  else{
    target = 2000;
  }

  const progress = packed / target;

  if(!started){

    ring.innerText = "--";

    ring.style.border = "6px solid rgba(255,255,255,0.2)";
    ring.style.boxShadow = "0 0 20px rgba(255,255,255,0.2)";

    trackText.innerText = "";
  }

  else if(packed >= total && total > 0){

    ring.innerText = "100% COMPLETE";

    ring.style.border = "6px solid #00ff88";
    ring.style.boxShadow = "0 0 25px #00ff88";

    trackText.innerText = "Finished";
  }

  else if(progress >= 1){

    ring.innerText = "ON TRACK";

    ring.style.border = "6px solid #00ff88";
    ring.style.boxShadow = "0 0 20px #00ff88";

    trackText.innerText = "Green reached";
  }

  else if(progress >= 0.75){

    ring.innerText =
      Math.ceil(target - packed) + " UNITS TO GREEN";

    ring.style.border = "6px solid orange";
    ring.style.boxShadow = "0 0 20px orange";

    trackText.innerText =
      "Current target: " + target;
  }

  else{

    ring.innerText =
      Math.ceil(target - packed) + " UNITS TO GREEN";

    ring.style.border = "6px solid red";
    ring.style.boxShadow = "0 0 25px red";

    trackText.innerText =
      "Current target: " + target;
  }
}

function renderRecent(){

  const last4 = recent.slice(0,4);

  recentTop.innerHTML = last4.length
    ? last4.map((v,i)=>`
        <div class="recentItem ${i===0?'':'fade'}">
          +${v}
        </div>
      `).join("")
    : `<div class="recentItem fade">No entries</div>`;
}

</script>

</body>
</html>
