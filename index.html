<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:25px;
}

.card{
  width:600px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:8px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

/* layout */
.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
}

.panel{
  width:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* PIE */
#chartBox{
  width:180px;
  height:180px;
}

/* STATUS RING */
#statusRing{
  width:180px;
  height:180px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  transition:0.3s;
  border:6px solid rgba(255,255,255,0.2);
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* RECENT LIST */
#recentAdds{
  margin-top:10px;
  font-size:12px;
  text-align:left;
  width:100%;
}

.recentItem{
  margin:2px 0;
}

.fade{
  opacity:0.4;
}

/* LEGEND */
.legend{
  font-size:11px;
  margin-bottom:6px;
  opacity:0.9;
}

/* END BUTTON */
#endBtn{
  margin-top:15px;
  background:#ff4d4d;
  color:white;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Total units">
  <button onclick="start()">Start</button>
</div>

<div id="mainScreen" style="display:none;">

<div>Total: <span id="totalShow">0</span></div>
<div>Packed: <span id="packedShow">0</span></div>
<div>Remaining: <span id="remainingShow">0</span></div>

<input id="addInput" type="number" placeholder="Add units">
<button onclick="add()">Add</button>

<div class="frame">

<!-- STATUS RING -->
<div class="panel">
  <div id="statusRing">--</div>
</div>

<!-- PIE -->
<div class="panel">

<div class="legend">🟢 Packed | 🔴 Remaining</div>

<div id="chartBox">
  <canvas id="chart"></canvas>
</div>

<div id="recentAdds"></div>

</div>

</div>

<button id="endBtn" onclick="endShift()">End Production</button>

</div>

</div>

<script>

/* =======================
   SUPABASE
======================= */
const sb = supabase.createClient(
  "https://afakpgezcpvvnvoqcthj.supabase.co",
  "sb_publishable_n7KfiuQXIE_hekGgd3eXsQ_gEqaJ_9Y"
);

/* STATE */
let total=0;
let packed=0;
let recent=[];
let chart;

/* LOAD */
async function load(){
  const { data } = await sb
    .from("production_dashboard")
    .select("*")
    .eq("id",1)
    .single();

  if(!data) return;

  total = data.total;
  packed = data.packed;
  recent = data.recent_adds || [];

  showMain();
  createChart();
  update();
}

load();

/* START */
function start(){
  total = parseFloat(totalInput.value);
  packed = 0;

  save();
  showMain();
  createChart();
  update();
}

/* ADD */
function add(){
  let v = parseFloat(addInput.value);
  if(!v) return;

  packed += v;

  recent.unshift(v);
  if(recent.length>8) recent.pop();

  addInput.value="";

  save();
  update();
}

/* SAVE */
async function save(){
  await sb.from("production_dashboard").upsert({
    id:1,
    total,
    packed,
    recent_adds:recent
  });
}

/* UI */
function showMain(){
  startScreen.style.display="none";
  mainScreen.style.display="block";
}

/* CHART */
function createChart(){
  if(chart) return;

  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"]
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        datalabels:{
          color:"#fff",
          formatter:(v,ctx)=>{
            const d = ctx.chart.data.datasets[0].data;
            const sum = d[0]+d[1];
            return sum ? ((v/sum)*100).toFixed(0)+"%" : "0%";
          }
        }
      }
    },
    plugins:[ChartDataLabels]
  });
}

/* UPDATE */
function update(){

  totalShow.innerText = total;
  packedShow.innerText = packed;
  remainingShow.innerText = Math.max(total-packed,0);

  chart.data.datasets[0].data = [
    Math.min(packed,total),
    Math.max(total-packed,0)
  ];
  chart.update();

  /* STATUS RING */
  const ring = document.getElementById("statusRing");

  const ratio = total ? packed/total : 0;

  if(ratio >= 1){
    ring.innerText = "100%";
    ring.style.border="6px solid #00ff88";
    ring.style.boxShadow="0 0 25px #00ff88";
  }
  else if(ratio >= 0.8){
    ring.innerText = Math.round(ratio*100)+"%";
    ring.style.border="6px solid orange";
    ring.style.boxShadow="0 0 25px orange";
  }
  else{
    ring.innerText = Math.round(ratio*100)+"%";
    ring.style.border="6px solid red";
    ring.style.boxShadow="0 0 25px red";
  }

  /* RECENT */
  document.getElementById("recentAdds").innerHTML =
    recent.map((v,i)=>
      `<div class="recentItem ${i>=4?'fade':''}">+${v}</div>`
    ).join("");
}

/* END SHIFT */
function endShift(){
  alert(
    "Shift Complete\n\nPacked: "+packed+
    "\nRemaining: "+Math.max(total-packed,0)+
    "\nCompletion: "+((packed/total)*100).toFixed(1)+"%"
  );
}

</script>

</body>
</html>
