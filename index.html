<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

.card{
  width:560px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
}

.panel{
  width:50%;
  border:2px solid white;
  border-radius:12px;
  padding:15px;
}

#status{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
}

#chartBox{
  width:180px;
  height:180px;
  margin:auto;
}

#trackText{margin-top:10px;font-size:14px}

.recentItem{margin:2px 0;}
.fade{opacity:0.35;}

/* animation */
.fade-number{
  animation:fadeDown 0.35s ease;
}

@keyframes fadeDown{
  0%{opacity:0; transform:translateY(-10px);}
  100%{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Total units">
  <button onclick="start()">Start</button>
</div>

<div id="mainScreen" style="display:none;">

<div>Total: <span id="totalShow">0</span></div>
<div>Packed: <span id="packedShow">0</span></div>
<div>Remaining: <span id="remainingShow">0</span></div>

<input id="addInput" type="number" placeholder="Add units">
<button onclick="add()">Add</button>

<div class="frame">

<div class="panel">
  <div id="status">--</div>
  <div id="trackText">--</div>
</div>

<div class="panel">
  <div id="chartBox">
    <canvas id="chart"></canvas>
  </div>
</div>

</div>

</div>
</div>

<script>
const supabaseUrl = "https://afakpgezcpvvnvoqcthj.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmYWtwZ2V6Y3B2dm52b3FjdGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTY4ODYsImV4cCI6MjA5MzU3Mjg4Nn0.4sJ4VvVG09F0F5wsVlB3Z37v3oo9m0841NcaRr8bo4k";

const sb = supabase.createClient(supabaseUrl, supabaseKey);

const startScreen = document.getElementById("startScreen");
const mainScreen = document.getElementById("mainScreen");

const totalInput = document.getElementById("totalInput");
const addInput = document.getElementById("addInput");

const totalShow = document.getElementById("totalShow");
const packedShow = document.getElementById("packedShow");
const remainingShow = document.getElementById("remainingShow");

const statusBox = document.getElementById("status");
const trackText = document.getElementById("trackText");

let total = 0;
let packed = 0;
let chart;

/* ANIMATION */
function animateNumber(el, value){
  el.classList.remove("fade-number");
  void el.offsetWidth;
  el.innerText = value;
  el.classList.add("fade-number");
}

/* START */
function start(){
  const value = parseFloat(totalInput.value);
  if(isNaN(value) || value <= 0) return;

  total = value;
  packed = 0;

  startScreen.style.display="none";
  mainScreen.style.display="block";

  createChart();
  update();
}

/* CHART (FIXED) */
function createChart(){
  if(chart) return;

  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"]
      }]
    },

    options:{
      plugins:{

        /* LEGEND BACK */
        legend:{
          display:true,
          position:"bottom",
          labels:{
            color:"white"
          }
        },

        /* PERCENTAGES BACK */
        datalabels:{
          color:"white",
          font:{
            weight:"bold",
            size:12
          },
          formatter:(value,ctx)=>{
            let data = ctx.chart.data.datasets[0].data;
            let sum = data.reduce((a,b)=>a+b,0);
            if(sum === 0) return "0%";
            return ((value/sum)*100).toFixed(0) + "%";
          }
        }
      }
    },

    plugins:[ChartDataLabels]
  });
}

/* ADD */
function add(){
  const v = parseFloat(addInput.value);
  if(isNaN(v)) return;

  packed += v;
  addInput.value = "";

  update();
}

/* UPDATE */
function update(){
  if(!chart) return;

  animateNumber(totalShow, total);
  animateNumber(packedShow, packed);
  animateNumber(remainingShow, Math.max(total-packed,0));

  chart.data.datasets[0].data = [
    Math.min(packed,total),
    Math.max(total-packed,0)
  ];
  chart.update();

  const now = new Date();
  const start = new Date(); start.setHours(8,30,0,0);
  const end = new Date(); end.setHours(21,30,0,0);

  let timeProgress = (now-start)/(end-start);
  timeProgress = Math.max(0,Math.min(1,timeProgress));

  let expected = total*timeProgress;

  if(packed/total >= timeProgress){
    statusBox.style.background="green";
    statusBox.innerText="On Track";
  } else {
    statusBox.style.background="red";
    statusBox.innerText="Behind";
  }

  trackText.innerText =
    packed >= expected
    ? "On track"
    : "Need " + Math.ceil(expected-packed) + " units";
}

/* INIT */
</script>

</body>
</html>
