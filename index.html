<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

h1{margin-bottom:20px}

/* MAIN CARD */
.card{
  width:560px;
  margin:auto;
  background:rgba(255,255,255,0.12);
  border-radius:15px;
  padding:20px;
  backdrop-filter:blur(10px);
}

/* INPUT */
input{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
  width:180px;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:white;
  font-weight:bold;
}

button:hover{opacity:0.85}

.danger{
  background:#ff4d4d;
  color:white;
}

/* TOP VALUES */
.inline{
  font-size:20px;
  margin:10px;
}

/* OUTER FRAME (NEW WHITE PANEL) */
.frame{
  margin-top:20px;
  background:white;
  border-radius:15px;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:black;
}

/* LEFT SIDE (BUTTON + STATUS) */
.leftPanel{
  width:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

/* RIGHT SIDE (PIE) */
.rightPanel{
  width:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* STATUS */
#statusCircle{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:14px;
  background:gray;
  color:white;
}

/* PIE SIZE FIX */
#chartContainer{
  width:180px;
  height:180px;
}

/* LEGEND ABOVE PIE */
#legendNote{
  font-size:12px;
  margin-bottom:5px;
  color:#333;
}

/* REQUIRED TEXT */
#requiredText{
  font-size:13px;
  text-align:center;
  margin-top:10px;
}

/* SUMMARY */
#summary{
  display:none;
  margin-top:20px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<!-- START -->
<div id="startScreen">
  <p>Enter total units for today's production:</p>
  <input type="number" id="totalInput">
  <button onclick="start()">Start</button>
</div>

<!-- MAIN -->
<div id="mainScreen" style="display:none;">

  <div class="inline">Total: <span id="totalShow">0</span></div>
  <div class="inline">Packed: <span id="packedShow">0</span></div>

  <div>
    <input id="addInput" type="number" placeholder="Add units">
    <button onclick="add()">Add</button>
  </div>

  <!-- FRAMED DASHBOARD -->
  <div class="frame">

    <!-- LEFT SIDE -->
    <div class="leftPanel">

      <button class="danger" onclick="endProduction()">
        End Production
      </button>

      <div id="statusCircle">--</div>

      <div id="requiredText">--</div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="rightPanel">

      <div id="legendNote">🟢 Packed | 🔴 Remaining</div>

      <div id="chartContainer">
        <canvas id="chart"></canvas>
      </div>

    </div>

  </div>

</div>

<!-- SUMMARY -->
<div id="summary"></div>

</div>

<script>

let total = 0;
let packed = 0;
let chart;

const startShift = 8.5;
const endShift = 21.5;

const passwords = ["Kyle","Sofiya","Elamari","Osama"];

function nowDecimal(){
  const d = new Date();
  return d.getHours() + d.getMinutes()/60;
}

function timeProgress(){
  const n = nowDecimal();
  if(n <= startShift) return 0;
  if(n >= endShift) return 1;
  return (n - startShift) / (endShift - startShift);
}

function start(){

  total = parseFloat(document.getElementById("totalInput").value);
  if(!total) return;

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("mainScreen").style.display = "block";

  document.getElementById("totalShow").innerText = total;

  chart = new Chart(document.getElementById("chart"),{
    type:"pie",
    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00c853","#ff5252"]
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        datalabels:{
          color:"white",
          formatter:(v,c)=>{
            const d=c.chart.data.datasets[0].data;
            const t=d[0]+d[1];
            return ((v/t)*100).toFixed(0)+"%";
          }
        }
      }
    },
    plugins:[ChartDataLabels]
  });

  updateAll();
}

function add(){
  let v = parseFloat(document.getElementById("addInput").value);
  if(!v) return;

  packed += v;
  document.getElementById("packedShow").innerText = packed;
  document.getElementById("addInput").value = "";

  updateAll();
}

function updateAll(){

  let done = Math.min(packed,total);
  let left = Math.max(total-packed,0);

  chart.data.datasets[0].data = [done,left];
  chart.update();

  // STATUS
  let prog = packed / total;
  let time = timeProgress();

  const box = document.getElementById("statusCircle");

  if(prog >= time){
    box.style.background = "green";
    box.innerText = "On Track";
  } else if(prog >= time - 0.1){
    box.style.background = "orange";
    box.innerText = "Slightly Behind";
  } else {
    box.style.background = "red";
    box.innerText = "Behind";
  }

  updateRequired();
}

function updateRequired(){

  const expected = total * timeProgress();
  const diff = expected - packed;

  const el = document.getElementById("requiredText");

  if(diff <= 0){
    el.innerText = "On track (0 units needed)";
    el.style.color = "green";
  } else {
    el.innerText = "Need " + Math.ceil(diff) + " units to be on track";
    el.style.color = "orange";
  }
}

function endProduction(){

  let pass = prompt("Enter password:");
  if(!passwords.includes(pass)){
    alert("Access denied");
    return;
  }

  const pushed = total - packed;
  const percent = ((packed/total)*100).toFixed(1);

  document.getElementById("mainScreen").style.display = "none";
  document.getElementById("summary").style.display = "block";

  document.getElementById("summary").innerHTML = `
    <h2>Final Report</h2>
    <p><b>Packed:</b> ${packed}</p>
    <p><b>Pushed:</b> ${pushed}</p>
    <p><b>Completed:</b> ${percent}%</p>
  `;
}

setInterval(updateAll,60000);

</script>

</body>
</html>
