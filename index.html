<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#4facfe,#00c6ff);
  color:white;
  text-align:center;
  padding:30px;
}

.card{
  width:560px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}

input,button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin:10px;
}

button{
  background:white;
  font-weight:bold;
  cursor:pointer;
}

.frame{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:20px;
}

.panel{
  width:50%;
  border:2px solid white;
  border-radius:12px;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* 🔥 MATCH BOTH CIRCLES EXACTLY */
#status{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

#chartBox{
  width:120px;
  height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
}

canvas{
  width:120px !important;
  height:120px !important;
}

/* summary */
#summary{
  display:none;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>Production Dashboard</h1>

<div class="card">

<div id="startScreen">
  <input id="totalInput" type="number" placeholder="Total units">
  <button onclick="start()">Start</button>
</div>

<div id="mainScreen" style="display:none;">

<div>Total: <span id="totalShow">0</span></div>
<div>Packed: <span id="packedShow">0</span></div>
<div>Remaining: <span id="remainingShow">0</span></div>

<input id="addInput" type="number" placeholder="Add units">
<button onclick="add()">Add</button>

<div class="frame">

<div class="panel">
  <div id="status">--</div>
  <div id="trackText">--</div>
</div>

<div class="panel">
  <div id="chartBox">
    <canvas id="chart"></canvas>
  </div>
</div>

</div>

<button onclick="endShift()" style="margin-top:20px;background:#ff4d4d;color:white;">
  End Production
</button>

</div>

<div id="summary"></div>

</div>

<script>

let total = 0;
let packed = 0;
let chart;

/* START */
function start(){
  const v = parseFloat(document.getElementById("totalInput").value);
  if(isNaN(v) || v <= 0) return;

  total = v;
  packed = 0;

  document.getElementById("startScreen").style.display="none";
  document.getElementById("mainScreen").style.display="block";

  createChart();
  update();
}

/* CHART */
function createChart(){
  if(chart) return;

  chart = new Chart(document.getElementById("chart"),{
    type:"doughnut",

    data:{
      labels:["Packed","Remaining"],
      datasets:[{
        data:[0,total],
        backgroundColor:["#00ff88","#ff5252"],
        borderWidth:0
      }]
    },

    options:{
      responsive:false,
      maintainAspectRatio:false,
      cutout:"0%",

      plugins:{
        legend:{display:false},
        datalabels:{
          color:"white",
          font:{size:10,weight:"bold"},
          formatter:(value,ctx)=>{
            let data = ctx.chart.data.datasets[0].data;
            let sum = data.reduce((a,b)=>a+b,0);
            if(sum===0) return "0%";
            return ((value/sum)*100).toFixed(0)+"%";
          }
        }
      }
    },

    plugins:[ChartDataLabels]
  });
}

/* ADD */
function add(){
  const v = parseFloat(document.getElementById("addInput").value);
  if(isNaN(v)) return;

  packed += v;
  document.getElementById("addInput").value="";

  update();
}

/* UPDATE */
function update(){
  document.getElementById("totalShow").innerText = total;
  document.getElementById("packedShow").innerText = packed;
  document.getElementById("remainingShow").innerText = Math.max(total-packed,0);

  chart.data.datasets[0].data = [
    Math.min(packed,total),
    Math.max(total-packed,0)
  ];
  chart.update();

  const now = new Date();
  const start = new Date(); start.setHours(8,30,0,0);
  const end = new Date(); end.setHours(21,30,0,0);

  let progress = (now-start)/(end-start);
  progress = Math.max(0,Math.min(1,progress));

  let expected = total * progress;

  let status = document.getElementById("status");
  let track = document.getElementById("trackText");

  status.style.background = packed/total >= progress ? "green" : "red";
  status.innerText = packed/total >= progress ? "On Track" : "Behind";

  track.innerText =
    packed >= expected
    ? "On track"
    : "Need " + Math.ceil(expected-packed) + " units";
}

/* END SHIFT */
function endShift(){
  document.getElementById("mainScreen").style.display="none";
  document.getElementById("summary").style.display="block";

  const remaining = total - packed;
  const percent = total ? ((packed/total)*100).toFixed(1) : 0;

  document.getElementById("summary").innerHTML = `
    <h2>Shift Complete</h2>
    <p>Packed: ${packed}</p>
    <p>Remaining: ${remaining}</p>
    <p>Completion: ${percent}%</p>
    <button onclick="location.reload()">Restart</button>
  `;
}

</script>

</body>
</html>
